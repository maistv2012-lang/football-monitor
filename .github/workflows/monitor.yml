name: football-monitor

on:
  workflow_dispatch:
  schedule:
    - cron: '*/10 * * * *'

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Restore and save monitor state
        uses: actions/cache@v4
        with:
          path: .monitor_state
          key: monitor-state-${{ github.run_id }}
          restore-keys: |
            monitor-state-

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m pip install -U yt-dlp

      - name: Run Football Monitor once
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TVNZ_SCAN_LIMIT: "30"
          TVNZ_MAX_DOWNLOADS_PER_RUN: "5"
          TVNZ_YOUTUBE_CHANNEL_ID: "UCY8jpWswn6c3kpaHijtBUAg"
          FIFA_YOUTUBE_CHANNEL_ID: "UCpcTrCXblq78GZrTUTLWeBw"
          RUNNER_COUNTRY_OVERRIDE: ${{ vars.RUNNER_COUNTRY_OVERRIDE }}
          PYTHONIOENCODING: "utf-8"
        run: python monitor.py --once
