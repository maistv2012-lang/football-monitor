name: Telegram short bot

on:
  workflow_dispatch:
  schedule:
    - cron: '*/10 * * * *'

concurrency:
  group: telegram-short-bot
  cancel-in-progress: false

jobs:
  poll-once:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Restore Telegram monitor state
        uses: actions/cache/restore@v4
        with:
          path: .monitor_state
          key: telegram-monitor-state-${{ github.run_id }}
          restore-keys: |
            telegram-monitor-state-
            monitor-state-

      - name: Restore Telegram source videos
        uses: actions/cache/restore@v4
        with:
          path: downloads/telegram
          key: telegram-source-videos-${{ github.run_id }}
          restore-keys: |
            telegram-source-videos-

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Poll Telegram once
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONIOENCODING: "utf-8"
        run: python monitor.py --telegram-poll-once

      - name: Save Telegram monitor state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .monitor_state
          key: telegram-monitor-state-${{ github.run_id }}

      - name: Save Telegram source videos
        if: always()
        uses: actions/cache/save@v4
        with:
          path: downloads/telegram
          key: telegram-source-videos-${{ github.run_id }}
